name: "Tests"

on:
  push:
    branches: [main]
    paths-ignore: ["**.md"]
  pull_request:
    paths-ignore: ["**.md"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix:
        platform: [ubuntu-latest]
        # “22” is the oldest supported Node.js version (package.json `engines`)
        node: ["22", "lts/*", "current"]
        include:
          # Windows: One LTS job is enough
          - platform: windows-latest
            node: "lts/*"
    name: "Node ${{ matrix.node }} (${{ matrix.platform }})"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: "Install dependencies"
        run: npm ci
      - name: "Run tests"
        run: npm test

  test-macos:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        node: ["lts/*", "current"]
    name: "Node ${{ matrix.node }} (macOS)"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: "Install dependencies"
        run: npm ci
      - name: "Run tests"
        run: npm test